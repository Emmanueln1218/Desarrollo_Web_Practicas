# Configuracion de Base de Datos SQL Server
# Edita estos valores segun tu instalacion local.

# Servidor SQL Server.
# Servidor SQL Server.
server=ANONIMOUS

# Puerto.
# Puerto TCP de la instancia EMDIGITAL.
port=54238

# Nombre de la base de datos
database=MascotasDB

# Usuario de SQL Server (dejar vacio si usas Windows Authentication)
user=

# Contrasena (dejar vacio si usas Windows Authentication)
password=

# Usar Windows Authentication (true/false)
# Si es true, ignora user y password y usa credenciales de Windows.
integratedSecurity=true

# Usar encriptacion SSL (true/false)
encrypt=true

# Con certificados locales/self-signed, dejar true evita errores de certificado SSL.
trustServerCertificate=true

# Tamano del pool de conexiones
poolSize=5

# Timeout en milisegundos para obtener una conexion del pool
connectionTimeout=5000
